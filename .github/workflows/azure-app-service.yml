name: Deploy Node app to Azure App Service

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate Azure deployment secrets exist
        env:
          AZURE_APP_SERVICE_NAME: ${{ secrets.AZURE_APP_SERVICE_NAME }}
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          test -n "$AZURE_APP_SERVICE_NAME" || (echo "Missing secret: AZURE_APP_SERVICE_NAME" && exit 1)
          test -n "$AZURE_WEBAPP_PUBLISH_PROFILE" || (echo "Missing secret: AZURE_WEBAPP_PUBLISH_PROFILE" && exit 1)
          echo "Azure deployment secrets are present."

      - name: Validate app boots
        run: |
          npm start &
          sleep 5
          curl --fail http://localhost:3000/api/rulesets

      - name: Deploy to Azure App Service
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_SERVICE_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
